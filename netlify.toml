[build]
  command = "npm run build"

# Exam Notes (/api/study-kit/summarize) can run 30–120s+ (OpenAI + optional PDF OCR).
# Upgrading billing does NOT raise this: set it explicitly:
#   Netlify Dashboard → Site (kenworkspace) → Project configuration → Functions → Function timeout → e.g. 120 (seconds) → Save → trigger a new deploy.
# Logs: Functions → search "[study-kit/summarize]" after clicking Generate.

# Next.js App Router on Netlify (install: npm i -D @netlify/plugin-nextjs)
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # pdf-parse declares: node >=20.16 <21 || >=22.3
  NODE_VERSION = "22"

# Native addons for PDF text + screenshot OCR — keep out of the JS bundle where possible
[functions]
  external_node_modules = ["@napi-rs/canvas", "pdf-parse", "pdfjs-dist"]
