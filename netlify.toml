[build]
  command = "npm run build"

# If the site hits the account build+deploy time cap (~18m), check Netlify UI → Project → Build & deploy →
# Build settings / Environment (deploy timeouts) and reduce upload size (e.g. Stockfish loads from CDN, not public/).

# Exam Notes: long work uses async Background Function (see .env.example). Sync Next routes may still hit
# the default Lambda limit — raise timeout in Netlify UI: Project configuration → Functions → Function timeout
# (toml `timeout = 120` under [functions] is rejected by current config parsers).
# Docs: https://docs.netlify.com/build/functions/overview/
# Logs: Functions → search "[study-kit/summarize]" after Generate.
# Long OCR+AI: optional Background Function `study-kit-summarize-background` (15m) + job table (see scripts/sql + .env.example).

# Next.js App Router on Netlify (install: npm i -D @netlify/plugin-nextjs)
# Guardian in-app reader (`/api/guardian-read`) fetches www.theguardian.com HTML + runs JSDOM/Readability.
# If the reader returns HTTP 500 with an HTML body in the browser, raise Functions timeout in the Netlify UI
# and ensure outbound HTTPS to the Guardian is not blocked.
# Optional env: GUARDIAN_READ_TOTAL_MS (e.g. 25000), GUARDIAN_READ_FETCH_TIMEOUT_MS, GUARDIAN_READ_SERVERLESS_SAFE=0
# for long-running local/self-hosted. Defaults target ~9.5s on Netlify/Vercel to return JSON before hard timeouts.
# Restore/save Next.js webpack cache between builds (often 1GB+; avoids ~15min cold compiles).
[[plugins]]
  package = "./netlify/plugins/cache-next-cache"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Push reminders (calendar, study grid, IELTS vocab): Vercel crons in vercel.json do not run here.
# netlify/functions/calendar-reminders-cron.ts invokes GET /api/cron/calendar-reminders with CRON_SECRET.

[build.environment]
  # pdf-parse declares: node >=20.16 <21 || >=22.3
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Native addons for PDF text + screenshot OCR — keep out of the JS bundle where possible
[functions]
  external_node_modules = ["@napi-rs/canvas", "pdf-parse", "pdfjs-dist"]
