[build]
  command = "npm run build"

# Exam Notes (/api/study-kit/summarize) can run 30–120s+ (OpenAI + optional PDF OCR).
# Set duration in this file (recommended). Netlify caps `timeout` by plan — if deploy warns, lower it.
# Docs: https://docs.netlify.com/build/functions/overview/ (sync function limits; Background Functions for 15m async).
# Logs: Functions → search "[study-kit/summarize]" after Generate.
# Long OCR+AI: optional Background Function `study-kit-summarize-background` (15m) + job table (see scripts/sql + .env.example).

# Next.js App Router on Netlify (install: npm i -D @netlify/plugin-nextjs)
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # pdf-parse declares: node >=20.16 <21 || >=22.3
  NODE_VERSION = "22"

# Native addons for PDF text + screenshot OCR — keep out of the JS bundle where possible
[functions]
  external_node_modules = ["@napi-rs/canvas", "pdf-parse", "pdfjs-dist"]
  # Seconds. Netlify Build supports this key (see netlify/build#5683). Reduce on Free if deploy errors.
  timeout = 120
